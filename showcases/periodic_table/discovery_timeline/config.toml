[scene]
background = "#1a1a2e"

[animation]
total_frames = 450
framerate = 30
hold_end_ratio = 0.08
appear_duration = 0.04

[cell]
fill_opacity = 0.85
stroke_color = "#ffffff"
stroke_width = 1.0
stroke_opacity = 0.3
font_family = "Arial"
font_weight = "bold"
symbol_font_size = 22
number_font_size = 10
number_opacity = 0.7
number_offset = -0.28
label_color = "#ffffff"

[year_label]
font_family = "Arial"
font_size = 120
font_weight = "bold"
color = "#ffffff"
opacity = 0.08

[export]
output_dir = "output/periodic_table/discovery_timeline"
filename = "discovery_timeline"
converter = "playwright_http"
png_width_px = 1920
