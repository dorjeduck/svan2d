[scene]
width = 800
height = 800
background = "#0a0a1a"
timeline_easing = ""
reverse = false

[pendulum]
count = 272
turns = 3                    # number of spiral revolutions
inner_radius = 40
outer_radius = 280
arm_length = 60
bob_radius = 5
max_angle = 50
base_oscillations = 10
freq_step = 0.1
quantize_freq = true       # stop each pendulum after its last full cycle
freq_inward = true        # true = highest frequency at center
arm_color = "#555555"
arm_width = 1.5
bob_color_start = "#FDBE02"
bob_color_end = "#AA0000"
start_angle = 0              # degrees: 0=north, 90=east, 180=south, 270=west
clockwise = true

[export]
output_dir = "output/"
filename = "pendulum_waves_spiral"
converter = "playwright_http"
total_frames = 600
framerate = 30
png_width_px = 1600
