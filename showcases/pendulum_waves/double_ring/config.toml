[scene]
width = 800
height = 800
background = "#0a0a1a"
timeline_easing = ""
reverse = false

[pendulum]
quantize_freq = true       # stop each pendulum after its last full cycle

[pendulum.inner]
count = 60
radius = 120
arm_length = 70
bob_radius = 5
max_angle = 60
base_oscillations = 10
freq_step = 0.05
arm_color = "#555555"
arm_width = 1.5
bob_color_start = "#FDBE02"
bob_color_end = "#AA0000"
start_angle = 180            # degrees: 0=north, 90=east, 180=south, 270=west
clockwise = true

[pendulum.outer]
count = 120
radius = 250
arm_length = 70
bob_radius = 5
max_angle = 60
base_oscillations = 10
freq_step = 0.05
arm_color = "#555555"
arm_width = 1.5
bob_color_start = "#FDBE02"
bob_color_end = "#AA0000"
start_angle = 180            # degrees: 0=north, 90=east, 180=south, 270=west
clockwise = false

[export]
output_dir = "output/"
filename = "pendulum_waves_double_ring"
converter = "playwright_http"
total_frames = 1200
framerate = 30
png_width_px = 1200
