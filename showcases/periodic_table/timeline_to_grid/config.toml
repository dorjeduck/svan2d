[scene]
background = "#0f0f23"

[timeline]
axis_color = "#555555"
axis_width = 1.0
tick_height = 8
tick_color = "#555555"
tick_years = [1500, 1750, 1800, 1850, 1900, 1950, 2000]
tick_font_size = 9
tick_font_family = "Arial"
tick_label_color = "#666666"
tick_label_offset = 12

[cell]
fill_opacity = 0.85
stroke_color = "#ffffff"
stroke_width = 1.0
stroke_opacity = 0.3
font_family = "Arial"
font_weight = "bold"
symbol_font_size = 22
number_font_size = 10
number_opacity = 0.7
number_offset = -0.28
label_color = "#ffffff"

[year_label]
font_family = "Arial"
font_size = 120
font_weight = "bold"
color = "#ffffff"
opacity = 0.08

[animation]
total_frames = 600
framerate = 30
buildup_end = 0.55
appear_duration = 0.02
fly_end = 0.85
fly_arc_radius = 300
fly_stagger_per_period = 0.01
label_fade_end = 0.95

[export]
output_dir = "output/periodic_table/timeline_to_grid"
filename = "timeline_to_grid"
converter = "playwright_http"
png_width_px = 1920
